<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Cafe Iroki</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      html, body { margin: 0; height: 100%; background: #1c0f0b; color: #fdfbf7;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
      .wrap { height: 100%; display: flex; flex-direction: column; align-items: center;
        justify-content: center; text-align: center; padding: 24px; gap: 12px; }
      h1 { font-size: 1.5rem; margin: 0; letter-spacing: .04em; }
      p { color: #c9bcb3; font-size: .85rem; max-width: 22rem; line-height: 1.6; }
      button { margin-top: 8px; padding: 10px 22px; border-radius: 6px; border: 1px solid #c5a880;
        background: transparent; color: #fdfbf7; font-weight: 700; text-transform: uppercase;
        letter-spacing: .1em; font-size: .7rem; cursor: pointer; }
      .logo { font-weight: 900; letter-spacing: .3em; font-size: 1.1rem; color: #c5a880; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">IROKI いろき</div>
      <h1>You're Offline</h1>
      <p>We couldn't reach the internet. Your cached pages are still available — reconnect to continue ordering and reservations.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
